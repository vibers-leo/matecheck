import json
import requests
import uuid
import os

# 1. 설정 (사용자님의 환경에 맞게 자동 세팅)
COMFYUI_ADDRESS = "127.0.0.1:8188"
OUTPUT_DIR = "images"

# 2. 프로젝트별 설정 (여기만 수정하시면 됩니다!)
projects = {
    "Cyberpunk_App": "a futuristic cyberpunk city, neon lights, high-tech ui, 8k",
    "Eco_Friendly_Web": "clean nature, green forest, minimalist design, sunny day, eco style",
    "Game_Character": "heroic fantasy warrior, detailed armor, cinematic lighting, masterpiece"
}

def queue_prompt(prompt_workflow):
    p = {"prompt": prompt_workflow}
    data = json.dumps(p).encode('utf-8')
    requests.post(f"http://{COMFYUI_ADDRESS}/prompt", data=data)

# 3. 자동 실행 로직
with open("workflow_api.json", "r", encoding="utf-8") as f:
    workflow = json.load(f)

for project_name, prompt_text in projects.items():
    # 폴더 생성
    project_path = os.path.join(OUTPUT_DIR, project_name)
    os.makedirs(project_path, exist_ok=True)
    
    # 워크플로우에 프롬프트와 저장 경로 주입
    workflow["4"]["inputs"]["text"] = prompt_text  # 긍정 프롬프트 노드 번호
    workflow["2"]["inputs"]["seed"] = uuid.uuid4().int >> 96 # 매번 다른 그림을 위한 랜덤 시드
    workflow["3"]["inputs"]["filename_prefix"] = f"{project_name}/{project_name}"
    
    print(f"🚀 '{project_name}' 프로젝트 이미지 생성 요청 중...")
    queue_prompt(workflow)

print("\n✅ 모든 프로젝트의 생성 요청이 완료되었습니다! ComfyUI 화면을 확인하세요.")