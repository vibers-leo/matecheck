name: Deploy to NCP

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Setup SSH
        uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: ${{ secrets.NCP_SSH_KEY }}

      - name: Deploy to NCP server
        run: |
          ssh -o StrictHostKeyChecking=no ${{ secrets.NCP_USER }}@${{ secrets.NCP_HOST }} \
            "cd /root/projects/matecheck && \
             git stash --include-untracked 2>/dev/null; \
             git checkout -- . 2>/dev/null; \
             git clean -fd 2>/dev/null; \
             git pull origin main && \
             cd backend && \
             grep -q SECRET_KEY_BASE .env 2>/dev/null || echo \"SECRET_KEY_BASE=\$(openssl rand -hex 64)\" >> .env; \
             grep -q POSTGRES_PASSWORD .env 2>/dev/null || echo \"POSTGRES_PASSWORD=matecheck_prod_pw\" >> .env; \
             docker compose -p matecheck up -d --build --no-deps && \
             sleep 15 && \
             docker compose -p matecheck exec -T matecheck-api bundle exec rails db:migrate 2>/dev/null; \
             docker compose -p matecheck ps && \
             sleep 10 && \
             docker logs matecheck-api --tail 30 2>&1 && \
             curl -sf http://localhost:4010/up && echo '✅ MateCheck 배포 완료' || echo '⚠️ 헬스체크 실패' && \
             docker exec npm-app-1 nginx -s reload || true"

      - name: Cleanup old images
        if: success()
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.NCP_HOST }}
          username: ${{ secrets.NCP_USER }}
          key: ${{ secrets.NCP_SSH_KEY }}
          script: |
            docker image prune -af --filter "until=24h"
            docker builder prune -af --filter "until=24h"
