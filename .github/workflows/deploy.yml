name: Deploy to NCP

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Setup SSH
        uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: ${{ secrets.NCP_SSH_KEY }}

      - name: Deploy to NCP server
        run: |
          ssh -o StrictHostKeyChecking=no ${{ secrets.NCP_USER }}@${{ secrets.NCP_HOST }} \
            "cd /root/projects/matecheck && \
             git stash --include-untracked 2>/dev/null; \
             git checkout -- . 2>/dev/null; \
             git clean -fd 2>/dev/null; \
             git pull origin main && \
             cd backend && \
             docker compose down 2>/dev/null; \
             docker compose up -d --build && \
             sleep 15 && \
             docker compose exec -T matecheck-api bundle exec rails db:migrate 2>/dev/null; \
             docker compose ps && \
             echo '✅ MateCheck 배포 완료'"
