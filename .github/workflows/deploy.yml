name: Deploy to NCP

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Setup SSH
        uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: ${{ secrets.NCP_SSH_KEY }}

      - name: Deploy to NCP server
        run: |
          ssh -o StrictHostKeyChecking=no ${{ secrets.NCP_USER }}@${{ secrets.NCP_HOST }} \
            "cd /root/projects/matecheck/backend && \
             git stash --include-untracked 2>/dev/null; \
             git pull origin main && \
             docker compose build --no-cache matecheck-api && \
             docker compose up -d --force-recreate matecheck-api && \
             sleep 10 && \
             docker compose exec -T matecheck-api bundle exec rails db:migrate && \
             docker compose ps && \
             echo '✅ MateCheck 배포 완료'"
